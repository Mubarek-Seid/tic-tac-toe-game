<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Tic Tac Toe</title>

    <style>

        .container {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
}

.container div{

    border:1px solid black;

    background:rgb(11, 12, 12);

    display:flex;

    justify-content:center;

    align-items:center;
    align-self: center;
    font-size:40px;
    
    width:100px;
    height:100px;
}

#reset{

    width:100px;
    height:50px;

    font-size:18px;

    cursor:pointer;
}

#winner{

    font-size:20px;
}
body{

    background:#1f2430;
    color:white;

    text-align:center;
}




    </style>

</head>


<body>

<h1>Tic Tac Toe</h1>

<div class="container">

    <div></div>
    <div></div>
    <div></div>

    <div></div>
    <div></div>
    <div></div>

    <div></div>
    <div></div>
    <div></div>

</div>


<button id="reset">
Reset
</button>


<p>
Winner:
<span id="winner"></span>
</p>


<script src="index.js"></script>

</body>

</html>
